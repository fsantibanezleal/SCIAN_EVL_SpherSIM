  <text x="679" y="93" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#fff">Init</text>

  <rect x="714" y="74" width="55" height="28" rx="4" fill="#2e7d32" stroke="#66bb6a" stroke-width="1"/>
  <text x="741" y="93" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#fff">Play</text>

  <rect x="776" y="74" width="55" height="28" rx="4" fill="#c62828" stroke="#ef5350" stroke-width="1"/>
  <text x="803" y="93" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#fff">Pause</text>

  <rect x="838" y="74" width="48" height="28" rx="4" fill="#37474f" stroke="#78909c" stroke-width="1"/>
