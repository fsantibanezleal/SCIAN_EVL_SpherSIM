  <text x="835" y="153" text-anchor="middle" font-family="monospace" font-size="10" fill="#81d4fa">1000</text>

  <!-- Param: Number of DFCs -->
  <text x="652" y="178" font-family="Arial, sans-serif" font-size="10" fill="#bbb">Number of DFCs</text>
