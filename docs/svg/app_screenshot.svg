  <ellipse cx="302" cy="248" rx="14" ry="12" fill="url(#cellOrange)" fill-opacity="0.85" stroke="#ff6e40" stroke-width="1.5"/>
  <ellipse cx="335" cy="252" rx="15" ry="12" fill="url(#cellOrange)" fill-opacity="0.85" stroke="#ff6e40" stroke-width="1.5"/>
  <ellipse cx="365" cy="260" rx="13" ry="11" fill="url(#cellOrange)" fill-opacity="0.85" stroke="#ff6e40" stroke-width="1.5"/>
  <ellipse cx="285" cy="275" rx="15" ry="12" fill="url(#cellOrange)" fill-opacity="0.85" stroke="#ff6e40" stroke-width="1.5"/>
  <ellipse cx="318" cy="270" rx="14" ry="11" fill="url(#cellOrange)" fill-opacity="0.85" stroke="#ff6e40" stroke-width="1.5"/>
  <ellipse cx="350" cy="278" rx="13" ry="11" fill="url(#cellOrange)" fill-opacity="0.85" stroke="#ff6e40" stroke-width="1.5"/>
  <ellipse cx="255" cy="278" rx="12" ry="10" fill="url(#cellOrange)" fill-opacity="0.85" stroke="#ff6e40" stroke-width="1.5"/>
  <ellipse cx="300" cy="290" rx="14" ry="11" fill="url(#cellOrange)" fill-opacity="0.75" stroke="#ff6e40" stroke-width="1"/>
  <ellipse cx="335" cy="295" rx="13" ry="10" fill="url(#cellOrange)" fill-opacity="0.75" stroke="#ff6e40" stroke-width="1"/>
  <ellipse cx="270" cy="295" rx="12" ry="10" fill="url(#cellOrange)" fill-opacity="0.7" stroke="#ff6e40" stroke-width="1"/>
  <ellipse cx="380" cy="275" rx="12" ry="9" fill="url(#cellOrange)" fill-opacity="0.7" stroke="#ff6e40" stroke-width="1"/>

  <!-- Cell center dots -->
