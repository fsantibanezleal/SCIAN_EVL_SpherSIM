  <line x1="50" y1="440" x2="50" y2="400" stroke="#42a5f5" stroke-width="2"/>
  <text x="46" y="396" font-family="Arial, sans-serif" font-size="9" fill="#42a5f5">Z</text>
  <line x1="50" y1="440" x2="30" y2="455" stroke="#66bb6a" stroke-width="2"/>
  <text x="20" y="462" font-family="Arial, sans-serif" font-size="9" fill="#66bb6a">Y</text>

  <!-- Main sphere (3D perspective look) -->
  <circle cx="320" cy="240" r="165" fill="url(#sphere3d)" stroke="#4a7ab5" stroke-width="1"/>

  <!-- Wireframe lines on sphere -->
  <ellipse cx="320" cy="240" rx="165" ry="50" fill="none" stroke="#3a5a7a" stroke-width="0.6" stroke-opacity="0.6"/>
  <ellipse cx="320" cy="195" rx="150" ry="38" fill="none" stroke="#3a5a7a" stroke-width="0.4" stroke-opacity="0.4"/>
  <ellipse cx="320" cy="285" rx="150" ry="38" fill="none" stroke="#3a5a7a" stroke-width="0.4" stroke-opacity="0.4"/>
  <ellipse cx="320" cy="150" rx="115" ry="25" fill="none" stroke="#3a5a7a" stroke-width="0.3" stroke-opacity="0.3"/>
  <ellipse cx="320" cy="330" rx="115" ry="25" fill="none" stroke="#3a5a7a" stroke-width="0.3" stroke-opacity="0.3"/>

