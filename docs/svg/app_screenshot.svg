  <path d="M 320 75 Q 380 240, 320 405" fill="none" stroke="#3a5a7a" stroke-width="0.4" stroke-opacity="0.4"/>
  <path d="M 320 75 Q 200 240, 320 405" fill="none" stroke="#3a5a7a" stroke-width="0.3" stroke-opacity="0.3"/>
  <path d="M 320 75 Q 440 240, 320 405" fill="none" stroke="#3a5a7a" stroke-width="0.3" stroke-opacity="0.3"/>

