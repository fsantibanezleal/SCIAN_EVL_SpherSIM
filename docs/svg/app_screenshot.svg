<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" width="900" height="500">
  <defs>
    <radialGradient id="sphere3d" cx="38%" cy="35%" r="55%">
      <stop offset="0%" stop-color="#4a6fa5" stop-opacity="0.35"/>
      <stop offset="50%" stop-color="#2a4a7a" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#1a2a4a" stop-opacity="0.75"/>
    </radialGradient>
    <radialGradient id="cellOrange" cx="40%" cy="35%" r="50%">
      <stop offset="0%" stop-color="#ffab40"/>
      <stop offset="100%" stop-color="#e65100"/>
    </radialGradient>
    <linearGradient id="panelGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1e2938"/>
      <stop offset="100%" stop-color="#141c28"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Window chrome -->
  <rect width="900" height="500" fill="#0a0e14" rx="8"/>

  <!-- Title bar -->
  <rect width="900" height="32" fill="#151b24" rx="8"/>
  <rect y="16" width="900" height="16" fill="#151b24"/>
  <!-- Window dots -->
  <circle cx="18" cy="16" r="5" fill="#ff5f57"/>
  <circle cx="38" cy="16" r="5" fill="#febc2e"/>
  <circle cx="58" cy="16" r="5" fill="#28c840"/>
  <text x="450" y="21" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#888">SCIAN EVL SpherSIM -- localhost:8002</text>

  <!-- ===== 3D Viewport ===== -->
  <rect x="5" y="36" width="630" height="459" fill="#0d1117" rx="0"/>

  <!-- Grid floor (subtle perspective lines) -->
  <line x1="5" y1="380" x2="635" y2="380" stroke="#1a2530" stroke-width="0.5"/>
  <line x1="5" y1="340" x2="635" y2="340" stroke="#1a2530" stroke-width="0.5"/>
  <line x1="5" y1="420" x2="635" y2="420" stroke="#1a2530" stroke-width="0.5"/>

