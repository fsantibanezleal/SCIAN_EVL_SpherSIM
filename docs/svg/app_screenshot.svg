  <text x="835" y="181" text-anchor="middle" font-family="monospace" font-size="10" fill="#81d4fa">24</text>

  <!-- Param: Cell Radial Size -->
  <text x="652" y="206" font-family="Arial, sans-serif" font-size="10" fill="#bbb">Cell Radial Size</text>
  <rect x="790" y="194" width="90" height="20" rx="3" fill="#0d1520" stroke="#3a5a7a" stroke-width="1"/>
  <text x="835" y="209" text-anchor="middle" font-family="monospace" font-size="10" fill="#81d4fa">0.049</text>

  <!-- Param: Contour Vertices -->
  <text x="652" y="234" font-family="Arial, sans-serif" font-size="10" fill="#bbb">Contour Vertices</text>
  <rect x="790" y="222" width="90" height="20" rx="3" fill="#0d1520" stroke="#3a5a7a" stroke-width="1"/>
  <text x="835" y="237" text-anchor="middle" font-family="monospace" font-size="10" fill="#81d4fa">100</text>

  <!-- Param: EVL Speed -->
  <text x="652" y="262" font-family="Arial, sans-serif" font-size="10" fill="#bbb">EVL Speed</text>
  <rect x="790" y="250" width="90" height="20" rx="3" fill="#0d1520" stroke="#3a5a7a" stroke-width="1"/>
  <text x="835" y="265" text-anchor="middle" font-family="monospace" font-size="10" fill="#81d4fa">0.005</text>

  <!-- Param: Noise Std -->
  <text x="652" y="290" font-family="Arial, sans-serif" font-size="10" fill="#bbb">Noise Std</text>
  <rect x="790" y="278" width="90" height="20" rx="3" fill="#0d1520" stroke="#3a5a7a" stroke-width="1"/>
  <text x="835" y="293" text-anchor="middle" font-family="monospace" font-size="10" fill="#81d4fa">0.5</text>

  <!-- Param: Step Interval -->
  <text x="652" y="318" font-family="Arial, sans-serif" font-size="10" fill="#bbb">Step Interval (ms)</text>
  <rect x="790" y="306" width="90" height="20" rx="3" fill="#0d1520" stroke="#3a5a7a" stroke-width="1"/>
  <text x="835" y="321" text-anchor="middle" font-family="monospace" font-size="10" fill="#81d4fa">50</text>

  <!-- View Options section -->
  <text x="652" y="356" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#78909c">VIEW OPTIONS</text>
  <line x1="652" y1="361" x2="880" y2="361" stroke="#2a3a4a" stroke-width="1"/>

  <!-- Checkbox: Wireframe -->
  <rect x="652" y="370" width="14" height="14" rx="2" fill="#0d1520" stroke="#3a5a7a" stroke-width="1"/>
  <polyline points="655,378 658,381 665,374" fill="none" stroke="#42a5f5" stroke-width="2"/>
  <text x="674" y="382" font-family="Arial, sans-serif" font-size="10" fill="#bbb">Wireframe sphere</text>

  <!-- Checkbox: Axes -->
  <rect x="652" y="392" width="14" height="14" rx="2" fill="#0d1520" stroke="#3a5a7a" stroke-width="1"/>
  <polyline points="655,400 658,403 665,396" fill="none" stroke="#42a5f5" stroke-width="2"/>
  <text x="674" y="404" font-family="Arial, sans-serif" font-size="10" fill="#bbb">Show axes</text>

  <!-- Checkbox: Cell centers -->
  <rect x="652" y="414" width="14" height="14" rx="2" fill="#0d1520" stroke="#3a5a7a" stroke-width="1"/>
  <polyline points="655,422 658,425 665,418" fill="none" stroke="#42a5f5" stroke-width="2"/>
  <text x="674" y="426" font-family="Arial, sans-serif" font-size="10" fill="#bbb">Show cell centers</text>

  <!-- Status section -->
  <text x="652" y="456" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#78909c">STATUS</text>
  <line x1="652" y1="461" x2="880" y2="461" stroke="#2a3a4a" stroke-width="1"/>
  <circle cx="660" cy="478" r="5" fill="#66bb6a"/>
  <text x="674" y="482" font-family="Arial, sans-serif" font-size="10" fill="#66bb6a">Running -- Step 142</text>
</svg>
