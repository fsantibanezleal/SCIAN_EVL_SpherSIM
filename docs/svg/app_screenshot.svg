  <rect x="5" y="470" width="630" height="25" fill="#0a1118" fill-opacity="0.9"/>
  <text x="15" y="486" font-family="monospace" font-size="10" fill="#66bb6a">Step: 142</text>
  <text x="120" y="486" font-family="monospace" font-size="10" fill="#90caf9">Active cells: 24</text>
  <text x="300" y="486" font-family="monospace" font-size="10" fill="#888">FPS: 20</text>

