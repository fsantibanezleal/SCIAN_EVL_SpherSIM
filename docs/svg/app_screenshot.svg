  <circle cx="302" cy="248" r="2" fill="#fff"/>
  <circle cx="335" cy="252" r="2" fill="#fff"/>
  <circle cx="365" cy="260" r="2" fill="#fff"/>
  <circle cx="285" cy="275" r="2" fill="#fff"/>
  <circle cx="318" cy="270" r="2" fill="#fff"/>
  <circle cx="350" cy="278" r="2" fill="#fff"/>
  <circle cx="255" cy="278" r="2" fill="#fff"/>

