<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
    <linearGradient id="boxBackend" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2a3a5c"/>
      <stop offset="100%" stop-color="#1e2d4d"/>
    </linearGradient>
    <linearGradient id="boxFrontend" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2a4a3c"/>
      <stop offset="100%" stop-color="#1e3d2d"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.4"/>
    </filter>
    <marker id="arrowRight" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#64b5f6"/>
    </marker>
    <marker id="arrowLeft" markerWidth="10" markerHeight="7" refX="0" refY="3.5" orient="auto">
      <polygon points="10 0, 0 3.5, 10 7" fill="#64b5f6"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="800" height="500" fill="url(#bgGrad)" rx="8"/>

  <!-- Title -->
  <text x="400" y="38" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#e0e0e0">SCIAN EVL SpherSIM -- System Architecture</text>

  <!-- ===== BACKEND SECTION ===== -->
  <rect x="30" y="60" width="340" height="420" rx="10" fill="url(#boxBackend)" stroke="#3a5a8c" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="200" y="88" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#90caf9">FastAPI Backend (Python)</text>

  <!-- main.py box -->
  <rect x="55" y="105" width="290" height="50" rx="6" fill="#0d1b2a" stroke="#4a7ab5" stroke-width="1"/>
  <text x="200" y="126" text-anchor="middle" font-family="monospace" font-size="12" fill="#81d4fa">app/main.py</text>
  <text x="200" y="144" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#aaa">REST endpoints + WebSocket handler</text>

  <!-- SphericalEnvironment -->
  <rect x="55" y="170" width="138" height="55" rx="6" fill="#0d1b2a" stroke="#4a7ab5" stroke-width="1"/>
  <text x="124" y="191" text-anchor="middle" font-family="monospace" font-size="10" fill="#81d4fa">SphericalEnvironment</text>
  <text x="124" y="215" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#aaa">Embryo radius, EVL</text>
  <text x="124" y="225" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#aaa">speed, region bounds</text>

  <!-- DFCLayer -->
  <rect x="207" y="170" width="138" height="55" rx="6" fill="#0d1b2a" stroke="#4a7ab5" stroke-width="1"/>
  <text x="276" y="191" text-anchor="middle" font-family="monospace" font-size="11" fill="#81d4fa">DFCLayer</text>
  <text x="276" y="215" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#aaa">Cell population,</text>
  <text x="276" y="225" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#aaa">grid init, collective update</text>

  <!-- CellDFC -->
  <rect x="55" y="240" width="138" height="55" rx="6" fill="#0d1b2a" stroke="#4a7ab5" stroke-width="1"/>
  <text x="124" y="261" text-anchor="middle" font-family="monospace" font-size="11" fill="#81d4fa">CellDFC</text>
  <text x="124" y="282" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#aaa">AER position, contour,</text>
  <text x="124" y="292" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#aaa">update + noise</text>

  <!-- Collision Solver -->
  <rect x="207" y="240" width="138" height="55" rx="6" fill="#0d1b2a" stroke="#4a7ab5" stroke-width="1"/>
  <text x="276" y="261" text-anchor="middle" font-family="monospace" font-size="11" fill="#81d4fa">Collision Solver</text>
  <text x="276" y="282" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#aaa">Pairwise overlap</text>
  <text x="276" y="292" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#aaa">detection + resolution</text>

  <!-- EVLMargin -->
  <rect x="55" y="310" width="138" height="50" rx="6" fill="#0d1b2a" stroke="#4a7ab5" stroke-width="1"/>
  <text x="124" y="331" text-anchor="middle" font-family="monospace" font-size="11" fill="#81d4fa">EVLMargin</text>
  <text x="124" y="349" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#aaa">Latitude kinematic model</text>

  <!-- Geometry -->
  <rect x="207" y="310" width="138" height="50" rx="6" fill="#0d1b2a" stroke="#4a7ab5" stroke-width="1"/>
  <text x="276" y="331" text-anchor="middle" font-family="monospace" font-size="11" fill="#81d4fa">geometry.py</text>
  <text x="276" y="349" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#aaa">Coord conversions, mesh</text>

  <!-- API Routes note -->
  <rect x="55" y="375" width="290" height="40" rx="6" fill="#0d1b2a" stroke="#4a7ab5" stroke-width="1"/>
  <text x="200" y="393" text-anchor="middle" font-family="monospace" font-size="10" fill="#81d4fa">REST: /api/simulation/{init,start,stop,step,state}</text>
  <text x="200" y="408" text-anchor="middle" font-family="monospace" font-size="10" fill="#81d4fa">WS: /ws/simulation</text>

  <!-- Tech labels -->
  <text x="200" y="455" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#666">Python 3.11+ | FastAPI | NumPy | Uvicorn</text>

  <!-- ===== COMMUNICATION ARROWS ===== -->
  <!-- WebSocket arrow -->
  <line x1="370" y1="180" x2="430" y2="180" stroke="#64b5f6" stroke-width="2" marker-end="url(#arrowRight)" marker-start="url(#arrowLeft)"/>
  <text x="400" y="170" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#64b5f6">WebSocket</text>

  <!-- REST arrow -->
  <line x1="370" y1="260" x2="430" y2="260" stroke="#64b5f6" stroke-width="2" marker-end="url(#arrowRight)" marker-start="url(#arrowLeft)"/>
  <text x="400" y="250" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#64b5f6">REST API</text>

  <!-- JSON label -->
  <text x="400" y="290" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#888">(JSON state)</text>

  <!-- ===== FRONTEND SECTION ===== -->
  <rect x="430" y="60" width="340" height="420" rx="10" fill="url(#boxFrontend)" stroke="#3a8c5a" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="600" y="88" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#a5d6a7">Three.js Frontend (Browser)</text>

  <!-- Three.js Scene -->
  <rect x="455" y="105" width="290" height="50" rx="6" fill="#0d1b2a" stroke="#4a8c5a" stroke-width="1"/>
  <text x="600" y="126" text-anchor="middle" font-family="monospace" font-size="12" fill="#a5d6a7">renderer3d.js</text>
  <text x="600" y="144" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#aaa">Three.js scene, sphere mesh, cell contours</text>

  <!-- OrbitControls -->
  <rect x="455" y="170" width="138" height="55" rx="6" fill="#0d1b2a" stroke="#4a8c5a" stroke-width="1"/>
  <text x="524" y="191" text-anchor="middle" font-family="monospace" font-size="11" fill="#a5d6a7">OrbitControls</text>
  <text x="524" y="215" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#aaa">Rotate, pan, zoom</text>
  <text x="524" y="225" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#aaa">mouse interaction</text>

  <!-- WebSocket Client -->
  <rect x="607" y="170" width="138" height="55" rx="6" fill="#0d1b2a" stroke="#4a8c5a" stroke-width="1"/>
  <text x="676" y="191" text-anchor="middle" font-family="monospace" font-size="11" fill="#a5d6a7">websocket.js</text>
  <text x="676" y="215" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#aaa">WS client with</text>
  <text x="676" y="225" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#aaa">auto-reconnect</text>

  <!-- Controls Panel -->
  <rect x="455" y="240" width="138" height="55" rx="6" fill="#0d1b2a" stroke="#4a8c5a" stroke-width="1"/>
  <text x="524" y="261" text-anchor="middle" font-family="monospace" font-size="11" fill="#a5d6a7">controls.js</text>
  <text x="524" y="282" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#aaa">Parameter panel,</text>
  <text x="524" y="292" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#aaa">Init / Play / Pause / Step</text>

  <!-- App orchestrator -->
  <rect x="607" y="240" width="138" height="55" rx="6" fill="#0d1b2a" stroke="#4a8c5a" stroke-width="1"/>
  <text x="676" y="261" text-anchor="middle" font-family="monospace" font-size="11" fill="#a5d6a7">app.js</text>
  <text x="676" y="282" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#aaa">Orchestration: binds</text>
  <text x="676" y="292" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#aaa">controls + renderer + WS</text>

  <!-- index.html -->
  <rect x="455" y="310" width="290" height="50" rx="6" fill="#0d1b2a" stroke="#4a8c5a" stroke-width="1"/>
  <text x="600" y="331" text-anchor="middle" font-family="monospace" font-size="12" fill="#a5d6a7">index.html</text>
  <text x="600" y="349" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#aaa">Single-page app shell with dark theme CSS</text>

  <!-- Style -->
  <rect x="455" y="375" width="290" height="40" rx="6" fill="#0d1b2a" stroke="#4a8c5a" stroke-width="1"/>
  <text x="600" y="399" text-anchor="middle" font-family="monospace" font-size="10" fill="#a5d6a7">style.css -- Dark theme, blue accent, responsive layout</text>

  <!-- Tech labels -->
  <text x="600" y="455" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#666">Three.js r128 (CDN) | Vanilla JS | HTML5 | CSS3</text>
</svg>
