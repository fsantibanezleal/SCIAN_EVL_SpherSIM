<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <marker id="arrowRed" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#ff4444"/>
    </marker>
    <marker id="arrowGreen" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#44ff88"/>
    </marker>
    <marker id="arrowYellow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#ffdd44"/>
    </marker>
    <radialGradient id="sphereGrad" cx="40%" cy="35%">
      <stop offset="0%" stop-color="#334466"/>
      <stop offset="100%" stop-color="#111822"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="500" fill="#0d1117" rx="8"/>

  <!-- Title -->
  <text x="400" y="32" text-anchor="middle" fill="#e6edf3" font-family="Consolas, monospace" font-size="16" font-weight="bold">Cartesian vs AER Collision Resolution</text>

  <!-- === LEFT SIDE: WRONG (AER push) === -->
  <text x="200" y="65" text-anchor="middle" fill="#ff4444" font-family="Consolas, monospace" font-size="14" font-weight="bold">WRONG: AER Push</text>
  <text x="200" y="82" text-anchor="middle" fill="#888" font-family="Consolas, monospace" font-size="10">Equal angular increment, unequal physical distance</text>

  <!-- Sphere left -->
  <ellipse cx="200" cy="270" rx="150" ry="150" fill="url(#sphereGrad)" stroke="#3388aa" stroke-width="1.5"/>

  <!-- Latitude lines -->
  <ellipse cx="200" cy="195" rx="130" ry="30" fill="none" stroke="#2255774d" stroke-width="0.8"/>
  <ellipse cx="200" cy="270" rx="150" ry="35" fill="none" stroke="#22557788" stroke-width="0.8"/>
  <ellipse cx="200" cy="345" rx="130" ry="30" fill="none" stroke="#2255774d" stroke-width="0.8"/>
  <!-- Longitude lines -->
  <ellipse cx="200" cy="270" rx="35" ry="150" fill="none" stroke="#2255774d" stroke-width="0.8"/>
  <ellipse cx="200" cy="270" rx="90" ry="150" fill="none" stroke="#2255774d" stroke-width="0.8"/>

  <!-- Pole label -->
  <text x="200" y="110" text-anchor="middle" fill="#556677" font-family="Consolas, monospace" font-size="9">North Pole (90deg)</text>
  <!-- Equator label -->
  <text x="365" y="268" fill="#556677" font-family="Consolas, monospace" font-size="9">Equator</text>

  <!-- Two overlapping cells at ~45 deg latitude (upper area) -->
  <circle cx="185" cy="200" r="16" fill="#ff444433" stroke="#ff6666" stroke-width="2"/>
  <circle cx="215" cy="200" r="16" fill="#ff444433" stroke="#ff6666" stroke-width="2"/>
  <text x="200" y="175" text-anchor="middle" fill="#ff8888" font-family="Consolas, monospace" font-size="9">45deg lat</text>

  <!-- AER push arrows at 45 deg: short physical distance because of cos(45) -->
  <line x1="185" y1="200" x2="158" y2="200" stroke="#ff4444" stroke-width="2.5" marker-end="url(#arrowRed)" filter="url(#glow)"/>
  <line x1="215" y1="200" x2="242" y2="200" stroke="#ff4444" stroke-width="2.5" marker-end="url(#arrowRed)" filter="url(#glow)"/>

  <!-- Physical distance bracket (short) -->
  <line x1="155" y1="215" x2="245" y2="215" stroke="#ff666688" stroke-width="1" stroke-dasharray="3,3"/>
  <text x="200" y="228" text-anchor="middle" fill="#ff8888" font-family="Consolas, monospace" font-size="9">physical: R*cos(45)*dphi</text>
  <text x="200" y="240" text-anchor="middle" fill="#ff6666" font-family="Consolas, monospace" font-size="10" font-weight="bold">= 0.71x</text>

  <!-- Two overlapping cells at equator -->
  <circle cx="185" cy="310" r="16" fill="#ff444433" stroke="#ff6666" stroke-width="2"/>
  <circle cx="215" cy="310" r="16" fill="#ff444433" stroke="#ff6666" stroke-width="2"/>
  <text x="200" y="340" text-anchor="middle" fill="#ff8888" font-family="Consolas, monospace" font-size="9">0deg lat</text>

  <!-- AER push arrows at equator: same angular, but full physical distance -->
  <line x1="185" y1="310" x2="158" y2="310" stroke="#ff4444" stroke-width="2.5" marker-end="url(#arrowRed)" filter="url(#glow)"/>
  <line x1="215" y1="310" x2="242" y2="310" stroke="#ff4444" stroke-width="2.5" marker-end="url(#arrowRed)" filter="url(#glow)"/>

  <line x1="155" y1="355" x2="245" y2="355" stroke="#ff666688" stroke-width="1" stroke-dasharray="3,3"/>
  <text x="200" y="368" text-anchor="middle" fill="#ff8888" font-family="Consolas, monospace" font-size="9">physical: R*cos(0)*dphi</text>
  <text x="200" y="380" text-anchor="middle" fill="#ff6666" font-family="Consolas, monospace" font-size="10" font-weight="bold">= 1.00x</text>

  <!-- Same dphi annotation -->
  <text x="200" y="412" text-anchor="middle" fill="#ff8888" font-family="Consolas, monospace" font-size="10">Same dphi, different distances!</text>

  <!-- Divider -->
  <line x1="400" y1="55" x2="400" y2="480" stroke="#334455" stroke-width="1.5" stroke-dasharray="6,4"/>

  <!-- === RIGHT SIDE: CORRECT (Cartesian push) === -->
  <text x="600" y="65" text-anchor="middle" fill="#44ff88" font-family="Consolas, monospace" font-size="14" font-weight="bold">RIGHT: Cartesian Push</text>
  <text x="600" y="82" text-anchor="middle" fill="#888" font-family="Consolas, monospace" font-size="10">3D vector projected to tangent plane</text>

  <!-- Sphere right -->
  <ellipse cx="600" cy="270" rx="150" ry="150" fill="url(#sphereGrad)" stroke="#33aa66" stroke-width="1.5"/>

  <!-- Latitude lines -->
  <ellipse cx="600" cy="195" rx="130" ry="30" fill="none" stroke="#2277554d" stroke-width="0.8"/>
  <ellipse cx="600" cy="270" rx="150" ry="35" fill="none" stroke="#22775588" stroke-width="0.8"/>
  <ellipse cx="600" cy="345" rx="130" ry="30" fill="none" stroke="#2277554d" stroke-width="0.8"/>
  <!-- Longitude lines -->
  <ellipse cx="600" cy="270" rx="35" ry="150" fill="none" stroke="#2277554d" stroke-width="0.8"/>
  <ellipse cx="600" cy="270" rx="90" ry="150" fill="none" stroke="#2277554d" stroke-width="0.8"/>

  <!-- Pole label -->
  <text x="600" y="110" text-anchor="middle" fill="#556677" font-family="Consolas, monospace" font-size="9">North Pole (90deg)</text>
  <!-- Equator label -->
  <text x="765" y="268" fill="#556677" font-family="Consolas, monospace" font-size="9">Equator</text>

  <!-- Two overlapping cells at ~45 deg latitude -->
  <circle cx="585" cy="200" r="16" fill="#44ff8833" stroke="#44ff88" stroke-width="2"/>
  <circle cx="615" cy="200" r="16" fill="#44ff8833" stroke="#44ff88" stroke-width="2"/>
  <text x="600" y="175" text-anchor="middle" fill="#88ffaa" font-family="Consolas, monospace" font-size="9">45deg lat</text>

  <!-- Cartesian push at 45 deg: SAME physical distance as equator -->
  <line x1="585" y1="200" x2="552" y2="196" stroke="#44ff88" stroke-width="2.5" marker-end="url(#arrowGreen)" filter="url(#glow)"/>
  <line x1="615" y1="200" x2="648" y2="204" stroke="#44ff88" stroke-width="2.5" marker-end="url(#arrowGreen)" filter="url(#glow)"/>

  <!-- Tangent plane hint -->
  <line x1="540" y1="210" x2="660" y2="190" stroke="#44ff8844" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="670" y="190" fill="#44ff8888" font-family="Consolas, monospace" font-size="8">tangent plane</text>

  <line x1="548" y1="225" x2="652" y2="225" stroke="#44ff8888" stroke-width="1" stroke-dasharray="3,3"/>
  <text x="600" y="238" text-anchor="middle" fill="#88ffaa" font-family="Consolas, monospace" font-size="9">physical: push distance</text>
  <text x="600" y="250" text-anchor="middle" fill="#44ff88" font-family="Consolas, monospace" font-size="10" font-weight="bold">= 1.00x</text>

  <!-- Two overlapping cells at equator -->
  <circle cx="585" cy="310" r="16" fill="#44ff8833" stroke="#44ff88" stroke-width="2"/>
  <circle cx="615" cy="310" r="16" fill="#44ff8833" stroke="#44ff88" stroke-width="2"/>
  <text x="600" y="340" text-anchor="middle" fill="#88ffaa" font-family="Consolas, monospace" font-size="9">0deg lat</text>

  <!-- Cartesian push at equator: same physical distance -->
  <line x1="585" y1="310" x2="552" y2="310" stroke="#44ff88" stroke-width="2.5" marker-end="url(#arrowGreen)" filter="url(#glow)"/>
  <line x1="615" y1="310" x2="648" y2="310" stroke="#44ff88" stroke-width="2.5" marker-end="url(#arrowGreen)" filter="url(#glow)"/>

  <line x1="548" y1="355" x2="652" y2="355" stroke="#44ff8888" stroke-width="1" stroke-dasharray="3,3"/>
  <text x="600" y="368" text-anchor="middle" fill="#88ffaa" font-family="Consolas, monospace" font-size="9">physical: push distance</text>
  <text x="600" y="380" text-anchor="middle" fill="#44ff88" font-family="Consolas, monospace" font-size="10" font-weight="bold">= 1.00x</text>

  <!-- Same distance annotation -->
  <text x="600" y="412" text-anchor="middle" fill="#88ffaa" font-family="Consolas, monospace" font-size="10">Latitude-independent separation!</text>

  <!-- Bottom formula -->
  <rect x="150" y="440" width="500" height="45" rx="6" fill="#161b22" stroke="#334455" stroke-width="1"/>
  <text x="400" y="460" text-anchor="middle" fill="#ffdd44" font-family="Consolas, monospace" font-size="11">tangent = dir - (dir . n)n    |    xyz_new = R * normalize(xyz + push * tangent)</text>
  <text x="400" y="476" text-anchor="middle" fill="#888" font-family="Consolas, monospace" font-size="9">Project to tangent plane, then re-project to sphere surface</text>
</svg>